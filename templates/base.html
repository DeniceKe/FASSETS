<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}FASSETS{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #eef4ff;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --ink: #142033;
      --muted: #61708a;
      --line: rgba(36, 67, 118, 0.12);
      --brand: #1d4ed8;
      --brand-deep: #173ea6;
      --accent: #dbeafe;
      --danger: #b54437;
      --shadow: 0 24px 60px rgba(21, 43, 86, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.15), transparent 24%),
        radial-gradient(circle at top right, rgba(147, 197, 253, 0.35), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    .shell {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-badge {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.24);
    }

    .brand-title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-link,
    .button-link,
    button,
    input,
    select {
      font: inherit;
    }

    .nav-link,
    .button-link,
    .chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      padding: 10px 14px;
      color: var(--ink);
    }

    .nav-link:hover,
    .button-link:hover {
      border-color: rgba(29, 78, 216, 0.22);
      background: rgba(29, 78, 216, 0.08);
    }

    .nav-link.active {
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      border-color: transparent;
    }

    .user-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(29, 78, 216, 0.09);
      color: var(--brand-deep);
      border: 1px solid rgba(29, 78, 216, 0.12);
      font-size: 0.92rem;
    }

    .logout-form { margin: 0; }

    .button-link,
    button {
      cursor: pointer;
      border: 0;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      padding: 11px 16px;
      box-shadow: 0 10px 24px rgba(29, 78, 216, 0.24);
    }

    .button-link.secondary,
    button.secondary {
      background: rgba(255,255,255,0.92);
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    main { display: block; }

    .page-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .section {
      padding: 24px;
    }

    .section + .section {
      border-top: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.82rem;
      font-weight: 700;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: clamp(2rem, 3vw, 3.2rem); line-height: 1.02; margin-bottom: 10px; }
    h2 { font-size: 1.35rem; margin-bottom: 14px; }
    h3 { font-size: 1.04rem; margin-bottom: 10px; }
    p { color: var(--muted); line-height: 1.6; }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid.metrics { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .grid.two { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid.three { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

    .panel,
    .metric-card {
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
    }

    .metric-card strong {
      display: block;
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .metric-card span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .accent-panel {
      background: linear-gradient(140deg, rgba(12, 107, 88, 0.95), rgba(8, 76, 64, 0.95));
      color: #fff;
    }

    .accent-panel p,
    .accent-panel .muted-light { color: rgba(255,255,255,0.78); }

    .inline-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    input,
    select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: rgba(255,255,255,0.92);
      color: var(--ink);
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(29, 78, 216, 0.14);
      border-color: rgba(29, 78, 216, 0.26);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.55);
      border-radius: 18px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    tr:last-child td { border-bottom: 0; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.9rem;
      border: 1px solid var(--line);
      background: #fff;
      white-space: nowrap;
    }

    .status.available { color: var(--brand-deep); background: rgba(29, 78, 216, 0.09); }
    .status.allocated { color: #7c4a00; background: rgba(219, 234, 254, 0.95); }
    .status.maintenance,
    .status.in_progress,
    .status.scheduled { color: #1c5272; background: rgba(52, 126, 173, 0.12); }
    .status.disposed,
    .status.cancelled { color: var(--danger); background: rgba(181, 68, 55, 0.12); }
    .status.returned,
    .status.completed { color: #5d5d5d; background: rgba(120,120,120,0.1); }
    .status.overdue { color: var(--danger); background: rgba(181, 68, 55, 0.12); }

    .empty-state {
      text-align: center;
      padding: 28px;
      border: 1px dashed rgba(35, 45, 65, 0.18);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.5);
    }

    .list-stack {
      display: grid;
      gap: 12px;
    }

    .list-item {
      display: grid;
      gap: 6px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.58);
    }

    .list-item strong { font-size: 1rem; }

    .muted { color: var(--muted); }
    .endpoint-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .endpoint-card {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.58);
    }

    .endpoint-card code {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(29, 78, 216, 0.08);
      color: var(--brand-deep);
      word-break: break-all;
    }

    .login-shell {
      min-height: calc(100vh - 72px);
      display: grid;
      place-items: center;
      padding: 20px 0;
    }

    .login-layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 0;
      width: min(1080px, 100%);
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .login-intro,
    .login-form-wrap { padding: 34px; }

    .login-intro {
      background:
        radial-gradient(circle at top left, rgba(240,168,59,0.22), transparent 34%),
        linear-gradient(150deg, rgba(29,78,216,0.96), rgba(23,62,166,0.96));
      color: #fff;
    }

    .login-intro p,
    .login-intro li { color: rgba(255,255,255,0.82); }

    .login-form-wrap {
      background: rgba(255, 252, 247, 0.94);
    }

    .form-stack {
      display: grid;
      gap: 16px;
    }

    .form-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .form-help {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .alert {
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(181, 68, 55, 0.14);
      background: rgba(181, 68, 55, 0.08);
      color: #7c2f26;
    }

    @media (max-width: 840px) {
      .topbar {
        border-radius: 28px;
        padding: 18px;
      }

      .shell {
        width: min(100% - 20px, 1220px);
      }

      .section,
      .login-intro,
      .login-form-wrap {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  {% with current_name=request.resolver_match.url_name %}
  <div class="shell">
    <nav class="topbar">
      <div class="brand">
        <div class="brand-badge">FS</div>
        <div>
          <p class="brand-title">FASSETS</p>
          <p class="brand-subtitle">Faculty of Science Asset Management System</p>
        </div>
      </div>

      <div class="nav-links">
        <a class="nav-link {% if current_name == 'about' %}active{% endif %}" href="{% url 'assets:about' %}">About</a>
        <a class="nav-link {% if current_name == 'asset_list' %}active{% endif %}" href="{% url 'assets:asset_list' %}">Inventory</a>
        <a class="nav-link" href="/admin/">Admin</a>
      </div>

      <div class="user-panel">
        {% if user.is_authenticated %}
          <a class="button-link secondary" href="{% url 'assets:dashboard' %}">Dashboard</a>
          <span class="pill">{{ user.username }}</span>
          <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="secondary">Logout</button>
          </form>
        {% else %}
          <a class="button-link secondary" href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  {% endwith %}
</body>
</html>
