<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fassets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <nav style="padding:12px; border-bottom:1px solid #ddd;">
    <a href="{% url 'assets:dashboard' %}">Dashboard</a> |
    <a href="{% url 'assets:asset_list' %}">Assets</a> |
    <a href="/admin/">Admin</a>

    <span style="float:right;">
      {% if user.is_authenticated %}
        {{ user.username }} |
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit" style="background:none;border:none;color:blue;cursor:pointer;padding:0;">
            Logout
          </button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </span>
  </nav>

  <main style="padding:16px;">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
